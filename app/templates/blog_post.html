<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - UptimeNode Blog</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#050505">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root, [data-theme="dark"] { --bg: #050505; --card: rgba(10,10,10,0.85); --border: rgba(0,255,102,0.12); --text: #e2e8f0; --heading: #f1f5f9; --muted: #94a3b8; --dim: #64748b; --accent: #00ff66; --accent2: #00ff66; }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --heading: #0f172a; --muted: #475569; --dim: #94a3b8; --accent: #00cc55; --accent2: #00aa44; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); background-image: linear-gradient(rgba(0,255,102,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,102,0.02) 1px, transparent 1px); background-size: auto, 40px 40px, 40px 40px; color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
        .nav { background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,255,102,0.12); padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .nav-brand { color: var(--accent2); font-size: 1.3rem; font-weight: 700; text-decoration: none; }
        .nav a { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
        .nav a:hover { color: var(--text); }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .back { color: var(--accent); text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; }
        .back:hover { text-decoration: underline; box-shadow: 0 0 15px rgba(0,255,102,0.3); }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .meta { color: var(--dim); font-size: 0.85rem; margin-bottom: 2rem; }
        .content { line-height: 1.8; color: var(--muted); font-size: 1rem; }
        .content h2 { color: var(--heading); font-size: 1.4rem; margin: 2rem 0 0.75rem; }
        .content h3 { color: var(--heading); font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
        .content p { margin-bottom: 1rem; }
        .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
        .content li { margin-bottom: 0.5rem; }
        .content code { background: var(--card); border: 1px solid var(--border); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9rem; color: var(--accent2); }
        .content pre { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
        .content pre code { background: none; border: none; padding: 0; }
        .blog-nav-links { display: flex; gap: 1.5rem; }
        .hamburger { display: none; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.7rem; border-radius: 4px; cursor: pointer; font-size: 1.3rem; }
        .hamburger:hover { border-color: var(--accent); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .mobile-sidebar { display: none; position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-right: 1px solid rgba(0,255,102,0.12); z-index: 100; padding: 1.5rem 0; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s ease; }
        .mobile-sidebar.open { transform: translateX(0); }
        .mobile-sidebar-header { padding: 0 1.5rem 1rem; border-bottom: 1px solid rgba(0,255,102,0.12); display: flex; justify-content: space-between; align-items: center; }
        .mobile-sidebar-header h2 { color: #00ff66; font-size: 1.2rem; }
        .mobile-sidebar-close { background: transparent; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
        .mobile-sidebar-nav { padding: 1rem 0; }
        .mobile-sidebar-nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.9rem; }
        .mobile-sidebar-nav a:hover, .mobile-sidebar-nav a.active { background: rgba(0,255,102,0.1); color: var(--accent); }
        .mobile-sidebar-nav .divider { height: 1px; background: rgba(0,255,102,0.12); margin: 0.75rem 0; }
        .mobile-sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(0,255,102,0.12); margin-top: auto; }
        .mobile-sidebar-footer button { width: 100%; text-align: left; background: transparent; border: none; color: #ff4444; padding: 0.75rem 1.5rem; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; }

        @media (max-width: 768px) {
            .blog-nav-links { display: none !important; }
            .hamburger { display: block; }
            .mobile-sidebar, .sidebar-overlay { display: block; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <nav class="mobile-sidebar" id="mobileSidebar">
        <div class="mobile-sidebar-header">
            <h2>&#9202; UptimeNode</h2>
            <button class="mobile-sidebar-close" onclick="closeSidebar()">&times;</button>
        </div>
        <div class="mobile-sidebar-nav">
            {% if user %}
            <a href="/dashboard">Dashboard</a>
            {% else %}
            <a href="/login">Login</a>
            {% endif %}
            <a href="/blog">Blog</a>
        </div>
    </nav>

    <nav class="nav">
        <a href="/" class="nav-brand">&#9202; UptimeNode</a>
        <button class="hamburger" onclick="openSidebar()">&#9776;</button>
        <div class="blog-nav-links">
            {% if user %}
            <a href="/dashboard">Dashboard</a> &nbsp;|&nbsp;
            {% else %}
            <a href="/login">Login</a> &nbsp;|&nbsp;
            {% endif %}
            <a href="/blog">Blog</a>
        </div>
    </nav>
    <div class="container">
        <a href="/blog" class="back">&larr; Back to Blog</a>
        <h1>{{ post.title }}</h1>
        <div class="meta">{{ post.created_at.strftime('%B %d, %Y') if post.created_at else '' }}</div>
        <div class="content">{{ post.content | safe }}</div>
    </div>
    <script>
        function openSidebar() { document.getElementById('mobileSidebar').classList.add('open'); document.getElementById('sidebarOverlay').style.display = 'block'; }
        function closeSidebar() { document.getElementById('mobileSidebar').classList.remove('open'); document.getElementById('sidebarOverlay').style.display = 'none'; }
    </script>
</body>
</html>
