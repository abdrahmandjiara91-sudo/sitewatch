<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SiteWatch</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .auth-card h1 { text-align: center; font-size: 1.8rem; margin-bottom: 0.3rem; color: #c084fc; }
        .auth-card .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 0.85rem; }
        .auth-card .icon { text-align: center; font-size: 3rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 0.4rem; }
        .form-group input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #e2e8f0; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #c084fc; }
        .btn { width: 100%; background: #7c3aed; color: #fff; border: none; padding: 0.8rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #8b5cf6; }
        .error { background: #7f1d1d; color: #fca5a5; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; text-align: center; }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
        .links a { color: #c084fc; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .warning { background: #422006; color: #fbbf24; padding: 0.6rem; border-radius: 8px; font-size: 0.8rem; margin-bottom: 1rem; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="icon">&#9881;</div>
        <h1>Admin Panel</h1>
        <p class="subtitle">Restricted access - authorized personnel only</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label>Admin Email</label>
                <input name="email" type="email" placeholder="admin@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input name="password" type="password" placeholder="Enter admin password" required>
            </div>
            <button type="submit" class="btn">Access Admin Panel</button>
        </form>

        <div class="links">
            <a href="/login">&larr; Back to User Login</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js');
        }
    </script>
</body>
</html>
