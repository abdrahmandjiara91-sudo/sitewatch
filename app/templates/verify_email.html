<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - SiteWatch</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { color: #3b82f6; font-size: 1.5rem; }
        .logo p { color: #64748b; font-size: 0.875rem; margin-top: 0.25rem; }
        .icon { text-align: center; font-size: 3rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
        input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn-resend { background: transparent; border: 1px solid #334155; color: #94a3b8; margin-top: 0.75rem; }
        .btn-resend:hover { border-color: #3b82f6; color: #3b82f6; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; text-align: center; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <h1>SiteWatch</h1>
            <p>Verify your email address</p>
        </div>
        <div class="icon">&#9993;</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="success">{{ message }}</div>
        {% endif %}
        <p style="color: #94a3b8; text-align: center; margin-bottom: 1.25rem; font-size: 0.875rem;">
            We sent a 6-digit code to <strong style="color: #e2e8f0;">{{ email }}</strong>
        </p>
        <form method="POST" action="/verify-email">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label>Verification Code</label>
                <input name="code" type="text" placeholder="000000" required maxlength="6" pattern="[0-9]{6}" style="text-align: center; font-size: 1.5rem; letter-spacing: 8px;">
            </div>
            <button type="submit" class="btn">Verify Email</button>
        </form>
        <form method="POST" action="/verify-email/resend">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-resend">Resend Code</button>
        </form>
    </div>
</body>
</html>
