<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SiteWatch</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 1.5rem; }
        .logo h1 { color: #3b82f6; font-size: 1.5rem; }
        .logo p { color: #64748b; font-size: 0.875rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.5rem; }
        input { width: 100%; padding: 0.75rem 1rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #3b82f6; }
        .btn { width: 100%; padding: 0.75rem; background: #22c55e; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #16a34a; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; text-align: center; }
        .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; text-align: center; }
        .links { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: #64748b; }
        .links a { color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <h1>SiteWatch</h1>
            <p>Enter reset code + new password</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="success">{{ message }}</div>
        {% endif %}
        <form method="POST" action="/reset-password">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group">
                <label>Reset Code</label>
                <input name="code" type="text" placeholder="6-digit code" required maxlength="6" pattern="[0-9]{6}" style="text-align: center; font-size: 1.5rem; letter-spacing: 8px;">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input name="password" type="password" placeholder="Min 8 characters" required minlength="8" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input name="confirm_password" type="password" placeholder="Confirm new password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>
        <div class="links">
            <a href="/forgot-password">Resend code</a> &middot; <a href="/login">Back to login</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/static/service-worker.js'); }
    </script>
</body>
</html>
